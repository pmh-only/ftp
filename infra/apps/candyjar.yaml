apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: candyjar
  namespace: argocd
spec:
  destination:
    namespace: candyjar
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: candyjar
    helm:
      valuesObject:
        mode: hub-spoke
        fullnameOverride: candyjar

        spoke:
          hostPort:
            port: 22

        config:
          webUsername: pmh_only

        existingSecret: "candyjar-secrets"

        maxind:
          existingSecret: "candyjar-secrets"

        extraObjects:
          - apiVersion: bitnami.com/v1alpha1
            kind: SealedSecret
            metadata:
              name: candyjar-secrets
              namespace: candyjar
            spec:
              template:
                type: Opaque
                metadata:
                  name: candyjar-secrets
                  namespace: candyjar
              encryptedData:
                HUB_TOKEN: 
                MAXMIND_LICENSE_KEY: 
                OPENAI_API_KEY: 
                WEB_PASSWORD: 
    repoURL: https://pmh-only.github.io/candyjar
    targetRevision: x
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
